schema: spec-driven

context: |
  Package: @vanduo-oss/hex-grid (MIT, vanduo-oss org). Current release version: 1.1.0.
  Stack: Vanilla JavaScript (ESM source in src/index.js + src/hex-math.js), esbuild → ESM/CJS (scripts/build.js).
  Hex grid: canvas-rendered axial hex grid (class VdHexGrid). Purely programmatic (no data-* auto-init).
  Renders to a 2D canvas, reads Vanduo --vd-* theme tokens and observes theme changes. Ships a pure-math
  subexport @vanduo-oss/hex-grid/hex-math (axial coordinates, distance, neighbors, terrain tables).
  No CSS export — drawing is on canvas.
  Vue (1.1.0): optional ./vue subpath (src/vue.js → dist/vue.js, dist/vue.cjs, dist/vue.d.ts) ships the
  <VdHexGrid> component. `vue` is an OPTIONAL peer dependency, external in the build, never bundled.
  SSR-safe (the grid is created on mount); forwards select/zoom/pan events.
  Tests: Playwright in tests/ loading built dist.
  Repo: Standalone git repo nested in the Vanduo monorepo (0_vanduo). Canonical source here; built dist/ syncs
  into docs/ ecosystem assets.
  Public API contract: README.md + dist/vue.d.ts. Breaking changes require a semver bump and README updates.
  Do not publish openspec/ to npm — the files field is dist/, README.md only.

rules:
  proposal:
    - Call out npm semver impact and whether docs/ ecosystem asset sync is required
    - Note if README, dist/vue.d.ts, or Playwright tests must change
  specs:
    - Use Given/When/Then scenario format under each requirement
    - Use SHALL/MUST for normative requirements
    - Keep the vanilla core, the hex-math subexport, and the optional Vue bindings as separate capabilities
  design:
    - Prefer extending src/index.js, src/hex-math.js, and src/vue.js over new abstractions
    - Keep `vue` an optional peer (external in esbuild); never bundle Vue
    - Document build-output impact (index, hex-math, vue.js/vue.cjs/vue.d.ts)
  tasks:
    - Include pnpm build and pnpm test when code changes
    - Include README and dist/vue.d.ts updates when the public API changes
